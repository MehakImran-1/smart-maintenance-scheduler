{% extends "base.html" %}

{% block title %}Maintenance - Smart Maintenance Scheduler{% endblock %}

{% block content %}
<h1>📅 Maintenance Schedules</h1>

<!-- Add Maintenance Button -->
<button class="btn btn-primary" onclick="openAddMaintenanceModal()">+ Add Maintenance</button>

<!-- Maintenance Table -->
<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>Equipment ID</th>
                <th>Task Name</th>
                <th>Frequency</th>
                <th>Next Due</th>
                <th>Priority</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="maintenance-list">
            <tr><td colspan="6">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Add Maintenance Modal -->
<div id="maintenanceModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAddMaintenanceModal()">&times;</span>
        <h2>Add Maintenance Schedule</h2>
        <form onsubmit="addMaintenance(event)">
            <div class="form-group">
                <label>Equipment ID *</label>
                <input type="number" id="maint-equipment-id" required>
            </div>
            <div class="form-group">
                <label>Task Name *</label>
                <input type="text" id="maint-task-name" required>
            </div>
            <div class="form-group">
                <label>Frequency (Days) *</label>
                <input type="number" id="maint-frequency" value="30" required>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="maint-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Add Maintenance</button>
        </form>
    </div>
</div>

<script>
// Load maintenance when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadMaintenance();
});

function loadMaintenance() {
    fetch('/api/maintenance')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const tbody = document.getElementById('maintenance-list');
                tbody.innerHTML = '';
                
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No maintenance schedules yet</td></tr>';
                } else {
                    data.data.forEach(maint => {
                        const row = `<tr>
                            <td>${maint.equipment_id}</td>
                            <td>${maint.task_name}</td>
                            <td>${maint.frequency_days} days</td>
                            <td>${maint.next_due_date}</td>
                            <td><span class="badge badge-${maint.priority}">${maint.priority}</span></td>
                            <td>
                                <button class="btn-small" onclick="completeMaintenance(${maint.id})">Complete</button>
                                <button class="btn-small" onclick="deleteMaintenance(${maint.id})">Delete</button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                }
            }
        })
        .catch(error => console.error('Error:', error));
}

function openAddMaintenanceModal() {
    document.getElementById('maintenanceModal').style.display = 'block';
}

function closeAddMaintenanceModal() {
    document.getElementById('maintenanceModal').style.display = 'none';
}

function addMaintenance(event) {
    event.preventDefault();
    
    const data = {
        equipment_id: parseInt(document.getElementById('maint-equipment-id').value),
        task_name: document.getElementById('maint-task-name').value,
        frequency_days: parseInt(document.getElementById('maint-frequency').value),
        priority: document.getElementById('maint-priority').value
    };
    
    fetch('/api/maintenance', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Maintenance schedule added!');
            closeAddMaintenanceModal();
            loadMaintenance();
            document.querySelector('form').reset();
        }
    })
    .catch(error => console.error('Error:', error));
}

function completeMaintenance(id) {
    const technicianName = prompt('Technician name:');
    if (technicianName) {
        const data = {
            technician_name: technicianName,
            duration_hours: prompt('Duration (hours):', '1') || 1,
            cost: prompt('Cost ($):', '0') || 0
        };
        
        fetch(`/api/maintenance/${id}/complete`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Maintenance completed!');
                loadMaintenance();
            }
        })
        .catch(error => console.error('Error:', error));
    }
}

function deleteMaintenance(id) {
    if (confirm('Are you sure?')) {
        fetch(`/api/maintenance/${id}`, { method: 'DELETE' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Maintenance deleted!');
                    loadMaintenance();
                }
            })
            .catch(error => console.error('Error:', error));
    }
}

window.onclick = function(event) {
    const modal = document.getElementById('maintenanceModal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}
</script>
{% endblock %}
